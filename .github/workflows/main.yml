name: ZenPrompt Elite V2 - Repurposing Automatisé

on:
  workflow_dispatch:
  schedule:
    - cron: '30 07 * * *' # 7h30
    - cron: '00 11 * * *' # 11h00
    - cron: '00 13 * * *' # 13h00
    - cron: '00 18 * * *' # 18h00
    - cron: '00 20 * * *' # 20h00
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer ffmpeg et Node.js
        run: sudo apt-get update && sudo apt-get install -y ffmpeg nodejs

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U --pre yt-dlp

      - name: Injecter les Cookies YouTube (Bypass IP Cloud)
        run: |
          cat << 'EOF' > cookies.txt
          ${{ secrets.YT_COOKIES }}
          EOF

      - name: Nettoyer le cache yt-dlp
        run: yt-dlp --rm-cache-dir

      - name: Lancer le robot de repurposing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python bot.py
