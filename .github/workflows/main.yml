name: ZenPrompt Elite V2 - Repurposing Automatisé

on:
  schedule:
    - cron: '0 18 * * *' # Se déclenche automatiquement tous les jours (Heure Française : 19h00 en hiver / 20h00 en été)
  workflow_dispatch: # Permet de le lancer manuellement avec le bouton "Run workflow"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Mis à jour en 3.11 pour éviter l'obsolescence programmée par Google

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U yt-dlp # Force la mise à jour immédiate contre les blocages YouTube

      - name: Lancer le robot de repurposing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python bot.py
