name: ZenPrompt Elite V2 - Repurposing Automatisé

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer ffmpeg (Indispensable pour assembler/couper la vidéo)
        uses: nwai/setup-ffmpeg@v3

      - name: Installer Deno (Résolution native des challenges JS de YouTube)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U --pre yt-dlp

      - name: Nettoyer le cache yt-dlp au démarrage
        run: yt-dlp --rm-cache-dir

      - name: Lancer le robot de repurposing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python bot.py
