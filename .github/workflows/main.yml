name: ZenPrompt Elite V2 - Repurposing Automatisé

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer Node.js (Moteur JS pour contourner YouTube)
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Version à jour pour éviter les avertissements

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # L'argument --pre installe la version la plus récente de yt-dlp (Nightly)
          pip install -U --pre yt-dlp

      - name: Lancer le robot de repurposing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python bot.py
